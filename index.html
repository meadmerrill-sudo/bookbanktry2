const DEFAULT_REWARDS = {

// Age-scaled check-in config
function getCheckinConfig(age) {
  if (age <= 8)  return { count:1, prompt:"What just happened in the book? Tell me in one sentence!", intervalMin:5, intervalMax:12 };
  if (age <= 12) return { count:2, prompt:"Describe what's happening in the book right now.", intervalMin:8, intervalMax:18 };
  return { count:2, prompt:"What's happening right now, and how does the character feel about it?", intervalMin:10, intervalMax:20 };
}

const QUIZ_SYS = `You are a reading comprehension quiz generator. Given a book title, author, reader age, a book description, and the exact chapter they have read up to, generate exactly 3 multiple-choice questions. ONLY ask about events, characters, and plot points from chapters 1 through the stated chapter. Use the description for context. Age 7: simple plot/characters. Age 11: plot, motivation, themes. Age 13+: themes, inferences, character development. Return ONLY valid JSON, no markdown: {"questions":[{"q":"...","options":["A","B","C","D"],"answer":0}]}`;

function getMilestones(age, rewards) {
  const t = age>=18?[4,8,13,20,28]:age>=13?[6,10,15,22,30]:age>=11?[5,8,12,18,25]:[3,5,8,12,15];
  return t.map((books,i)=>({books,reward:(rewards||[])[i]||(rewards||[])[rewards.length-1]||"Reward"}));
}

function getStreak(books) {
  if (!books.length) return 0;
  const dates=[...new Set(books.map(b=>b.dateAdded))].sort((a,b)=>new Date(b)-new Date(a));
  const today=new Date().toLocaleDateString(), yesterday=new Date(Date.now()-86400000).toLocaleDateString();
  if (dates[0]!==today&&dates[0]!==yesterday) return 0;
  let streak=1;
  for (let i=1;i<dates.length;i++) { if (Math.round((new Date(dates[i-1])-new Date(dates[i]))/86400000)===1) streak++; else break; }
  return streak;
}

function fmtTime(secs) {
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0) return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function truncate(text,n=3) {
  if(!text) return "";
  const parts=text.match(/[^.!?]+[.!?]+/g)||[text];
  return parts.slice(0,n).join(" ").trim();
}

function loadState() { try { return JSON.parse(localStorage.getItem("bookbank_v6")||"null"); } catch { return null; } }

function initProfileData() {
  return DEFAULT_PROFILES.reduce((acc,p)=>{
    acc[p.id]={books:[],screenMinutes:0,pendingRewards:[],claimedMilestones:[],withdrawalLog:[],timerLog:[],pin:null,minSessionMins:15,pendingSessions:[]};
    return acc;
  },{});
}

const S = {
  card: {background:"#fff",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"1rem 1.25rem",marginBottom:10},

// ── BARCODE SCANNER (QuaggaJS — works on Safari/iPhone) ──────────
function BarcodeScanner({onDetected,onClose}) {
  const scannerRef=useRef(null);
  const [error,setError]=useState(null);
  const [hint,setHint]=useState("Point at the barcode on the back of the book");
  const detectedRef=useRef(false);

  useEffect(()=>{
    let active=true;
    if(!window.Quagga){setError("Scanner library not loaded. Please refresh and try again.");return;}
    Quagga.init({
      inputStream:{
        type:"LiveStream",
        target:scannerRef.current,
        constraints:{facingMode:"environment",width:{min:640},height:{min:480}},
      },
      decoder:{readers:["ean_reader","ean_8_reader","code_128_reader"]},
      locate:true,
      frequency:10,
    }, err=>{
      if(!active) return;
      if(err){setError("Camera access denied or not available. Please allow camera access and try again.");return;}
      Quagga.start();
    });

    Quagga.onDetected(result=>{
      if(detectedRef.current||!active) return;
      const code=result?.codeResult?.code;
      if(code&&code.length>=8){
        detectedRef.current=true;
        setHint("Barcode detected! Looking up book…");
        Quagga.stop();
        onDetected(code);
      }
    });

    Quagga.onProcessed(result=>{
      if(!active) return;
      if(result?.codeResult?.code) setHint("Barcode found! Hold steady…");
      else setHint("Point at the barcode on the back of the book");
    });

    return ()=>{
      active=false;
      try{Quagga.stop();}catch{}
    };
  },[]);

  return (
    <div style={{marginBottom:16}}>
      {error
        ?<div style={{background:"#FFEBEE",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#E24B4A",marginBottom:10}}>{error}</div>
        :<div className="scan-overlay" style={{minHeight:280}}>
           <div ref={scannerRef} style={{width:"100%",height:280}}/>
           <div className="scan-line"/>
           <div className="scan-corners"/>
           <div style={{position:"absolute",bottom:10,left:0,right:0,textAlign:"center",color:"#fff",fontSize:12,opacity:0.9,padding:"0 12px",textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>{hint}</div>
         </div>
      }
      <button onClick={()=>{try{Quagga.stop();}catch{}onClose();}} style={{...S.btn("#888"),marginTop:10,fontSize:13,padding:"8px"}}>Cancel scan</button>
    </div>
  );
}

// ── UPDATE PROGRESS ──────────────────────────────────────────────
function UpdateProgress({book,gid,color,onUpdate}) {
  const [open,setOpen]=useState(false);
  const [pages,setPages]=useState(book.pagesRead||0);
  const [chapter,setChapter]=useState(book.chapterOn||1);
  if(!open) return <button onClick={()=>setOpen(true)} style={{background:"transparent",border:`1px solid ${color}`,borderRadius:20,padding:"4px 12px",fontSize:12,color,cursor:"pointer",fontWeight:600}}>Update progress</button>;
  return (
    <div style={{background:"#f9f9f9",borderRadius:10,padding:"10px 12px",marginTop:4,width:"100%"}}>
      <div style={{display:"flex",gap:12,marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#888",marginBottom:4}}>Pages read</div>
          <input type="number" min={0} max={book.pages||9999} value={pages} onChange={e=>setPages(parseInt(e.target.value)||0)} style={{...S.input,textAlign:"center",fontSize:14}}/>
          <div style={{fontSize:10,color:"#aaa",textAlign:"center",marginTop:2}}>of {book.pages||"?"}</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#888",marginBottom:4}}>Current chapter</div>
          <input type="number" min={1} max={book.chapters||999} value={chapter} onChange={e=>setChapter(parseInt(e.target.value)||1)} style={{...S.input,textAlign:"center",fontSize:14}}/>
          <div style={{fontSize:10,color:"#aaa",textAlign:"center",marginTop:2}}>of {book.chapters||"?"}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{onUpdate(gid,book.id,pages,chapter);setOpen(false);}} style={{...S.solid(color),flex:1,padding:"8px"}}>Save</button>
        <button onClick={()=>setOpen(false)} style={{...S.btn("#888"),flex:1,padding:"8px"}}>Cancel</button>
      </div>
    </div>
  );
}

// ── CHECK-IN MODAL ───────────────────────────────────────────────
function CheckInModal({prompt,onAnswer,onDismiss,isWarning,color}) {
  const [answer,setAnswer]=useState("");
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}}>
      <div style={{background:"#fff",borderRadius:20,padding:"1.5rem",width:"100%",maxWidth:380}}>
        <div style={{fontSize:24,textAlign:"center",marginBottom:8}}>📖</div>
        {isWarning
          ?<><h3 style={{fontSize:17,fontWeight:700,textAlign:"center",marginBottom:8,color:"#E24B4A"}}>Reading check missed!</h3>
            <p style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:16}}>You missed the last check-in. Answer this one or your session will be flagged for review.</p></>
          :<><h3 style={{fontSize:17,fontWeight:700,textAlign:"center",marginBottom:8}}>Quick reading check!</h3>
            <p style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:16}}>Timer is still running — just a quick check!</p></>
        }
        <p style={{fontSize:15,fontWeight:600,marginBottom:12,textAlign:"center"}}>{prompt}</p>
        <textarea value={answer} onChange={e=>setAnswer(e.target.value)} placeholder="Type your answer here..." rows={3}
          style={{...S.input,resize:"none",marginBottom:12}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onDismiss} style={{...S.btn("#888"),flex:1,fontSize:13}}>Skip (flag session)</button>
          <button onClick={()=>answer.trim()&&onAnswer(answer)} disabled={!answer.trim()}
            style={{...S.solid(color),flex:1,fontSize:13,opacity:answer.trim()?1:0.4}}>Submit & keep reading</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────
function App() {
  const saved=loadState();
  const [profiles,setProfiles]  =useState(saved?.profiles ||DEFAULT_PROFILES);
  const [pData,setPData]        =useState(saved?.pData    ||initProfileData());
  const [rewards,setRewards]    =useState(saved?.rewards  ||DEFAULT_REWARDS);
  const [parentPin,setParentPin]=useState(saved?.parentPin||"1234");

  const [screen,setScreen]               =useState("home");
  const [activeId,setActiveId]           =useState(null);
  const [parentUnlocked,setParentUnlocked]=useState(false);
  const [parentTab,setParentTab]         =useState("overview");
  const [pinInput,setPinInput]           =useState("");
  const [pinConfirm,setPinConfirm]       =useState("");
  const [pinError,setPinError]           =useState("");
  const [pinStep,setPinStep]             =useState(1);

  // Timer state per book key
  const [timerActive,setTimerActive]=useState({});  // running
  const [timerPaused,setTimerPaused]=useState({});  // paused
  const [timerStart, setTimerStart] =useState({});  // last start timestamp
  const [elapsed,   setElapsed]    =useState({});   // accumulated seconds
  const [sessionData,setSessionData]=useState({});  // { checkins:[], flags:[], dismissed:0 }
  const intRef=useRef(null);

  // Check-in state
  const [checkinModal,setCheckinModal]=useState(null); // {key, prompt, isWarning}
  const checkinTimers=useRef({});

  const [showAddBook,  setShowAddBook]  =useState(false);
  const [showScanner,  setShowScanner]  =useState(false);
  const [scanLoading,  setScanLoading]  =useState(false);
  const [scanError,    setScanError]    =useState("");
  const [quizModal,    setQuizModal]    =useState(null);
  const [quizData,     setQuizData]     =useState(null);
  const [quizLoading,  setQuizLoading]  =useState(false);
  const [quizAns,      setQuizAns]      =useState([]);
  const [quizDone,     setQuizDone]     =useState(false);
  const [quizTimer,    setQuizTimer]    =useState(0);
  const [currentQ,     setCurrentQ]     =useState(0);
  const quizTimerRef=useRef(null);
  const [editProfile,  setEditProfile]  =useState(null);
  const [spendModal,   setSpendModal]   =useState(null);
  const [spendAmt,     setSpendAmt]     =useState(30);
  const [editRewards,  setEditRewards]  =useState(false);
  const [rewardDraft,  setRewardDraft]  =useState(null);
  const [changingPPin, setChangingPPin] =useState(false);
  const [newPPin,      setNewPPin]      =useState("");
  const [scannedISBN, setScannedISBN] = useState("");
  const [coverLoading, setCoverLoading] =useState(false);
  const [coverSearched,setCoverSearched]=useState(false);
  const [expandedBook, setExpandedBook] =useState(null);
  const emptyBook={title:"",author:"",pages:"",pagesRead:"",chapters:"",chapterOn:"1",rating:5,note:"",cover:"",description:""};
  const [newBook,setNewBook]=useState(emptyBook);

  useEffect(()=>{
    try{localStorage.setItem("bookbank_v6",JSON.stringify({profiles,pData,rewards,parentPin}));}catch{}
  },[profiles,pData,rewards,parentPin]);

  // Timer tick
  useEffect(()=>{
    if(Object.values(timerActive).some(Boolean)){
      intRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(prev=>{
          const next={...prev};
          Object.keys(timerActive).forEach(key=>{
            if(timerActive[key]&&!timerPaused[key]&&timerStart[key]){
              // Calculate from start timestamp + any previously accumulated time before pause
              next[key]=(prev[`${key}_base`]||0)+Math.floor((now-timerStart[key])/1000);
            }
          });
          return next;
        });
      },1000);
    } else clearInterval(intRef.current);
    return ()=>clearInterval(intRef.current);
  },[timerActive,timerPaused,timerStart]);

  // Quiz question timer
  useEffect(()=>{
    if(quizModal&&quizData&&!quizDone){
      setQuizTimer(8);
      quizTimerRef.current=setInterval(()=>{
        setQuizTimer(t=>{if(t<=1){clearInterval(quizTimerRef.current);return 0;}return t-1;});
      },1000);
    }
    return ()=>clearInterval(quizTimerRef.current);
  },[currentQ,quizData,quizModal]);

  function saveProfile(pid,fn){setPData(prev=>({...prev,[pid]:fn(prev[pid])}));}

  // ── TIMER CONTROLS ───────────────────────────────────────────
  function startTimer(key,pid,bookId) {
    const prof=profiles.find(p=>p.id===pid);
    const cfg=getCheckinConfig(prof.age);
    setTimerActive(p=>({...p,[key]:true}));
    setTimerPaused(p=>({...p,[key]:false}));
    setTimerStart(p=>({...p,[key]:Date.now()}));
    setElapsed(p=>({...p,[key]:0,[`${key}_base`]:0}));
    setSessionData(p=>({...p,[key]:{checkins:[],flags:[],dismissed:0}}));
    scheduleCheckins(key,pid,cfg);
  }

  function pauseTimer(key) {
    const now=Date.now();
    const base=(elapsed[`${key}_base`]||0)+Math.floor((now-(timerStart[key]||now))/1000);
    setElapsed(p=>({...p,[key]:base,[`${key}_base`]:base}));
    setTimerPaused(p=>({...p,[key]:true}));
    setTimerStart(p=>({...p,[key]:null}));
    if(checkinTimers.current[key]){clearTimeout(checkinTimers.current[key]);delete checkinTimers.current[key];}
  }

  function resumeTimer(key,pid) {
    const prof=profiles.find(p=>p.id===pid);
    const cfg=getCheckinConfig(prof.age);
    setTimerPaused(p=>({...p,[key]:false}));
    setTimerStart(p=>({...p,[key]:Date.now()}));
    scheduleCheckins(key,pid,cfg);
  }

  function stopTimer(key,pid,bookId) {
    const now=Date.now();
    const base=(elapsed[`${key}_base`]||0);
    const addl=timerStart[key]?Math.floor((now-timerStart[key])/1000):0;
    const totalSecs=base+addl;
    const mins=Math.floor(totalSecs/60);
    setTimerActive(p=>({...p,[key]:false}));
    setTimerPaused(p=>({...p,[key]:false}));
    setTimerStart(p=>({...p,[key]:null}));
    setElapsed(p=>({...p,[key]:0,[`${key}_base`]:0}));
    if(checkinTimers.current[key]){clearTimeout(checkinTimers.current[key]);delete checkinTimers.current[key];}
    setCheckinModal(null);

    const sd=sessionData[key]||{checkins:[],flags:[],dismissed:0};
    const prof=profiles.find(p=>p.id===pid);
    const minMins=pData[pid]?.minSessionMins||15;
    const flags=[...sd.flags];

    if(mins<minMins) flags.push(`Session under minimum (${mins} min of ${minMins} min required)`);
    if(sd.dismissed>0) flags.push(`Missed ${sd.dismissed} reading check-in${sd.dismissed>1?"s":""}`);

    const entry={
      id:Date.now(), date:new Date().toLocaleDateString(),
      time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
      mins, bookId, bookTitle:pData[pid]?.books.find(b=>b.id===bookId)?.title||"",
      checkins:sd.checkins, flags,
    };

    if(flags.length>0) {
      // Hold for approval
      saveProfile(pid,d=>({...d,pendingSessions:[...(d.pendingSessions||[]),entry],books:d.books.map(b=>b.id===bookId?{...b,timerLogged:true}:b)}));
    } else {
      // Bank immediately
      saveProfile(pid,d=>({...d,screenMinutes:d.screenMinutes+mins,timerLog:[{date:entry.date,time:entry.time,mins},...(d.timerLog||[])],books:d.books.map(b=>b.id===bookId?{...b,timerLogged:true}:b)}));
    }
    setElapsed(p=>({...p,[key]:0}));
    setSessionData(p=>({...p,[key]:{checkins:[],flags:[],dismissed:0}}));
  }

  // ── CHECK-INS ────────────────────────────────────────────────
  function scheduleCheckins(key,pid,cfg) {
    const pid_=pid;
    const delayMins=cfg.intervalMin+Math.random()*(cfg.intervalMax-cfg.intervalMin);
    const delayMs=delayMins*60*1000;
    if(checkinTimers.current[key]) clearTimeout(checkinTimers.current[key]);
    checkinTimers.current[key]=setTimeout(()=>{
      setCheckinModal({key,pid:pid_,prompt:cfg.prompt,isWarning:false});
    },delayMs);
  }

  function handleCheckinAnswer(key,pid,answer) {
    setSessionData(p=>({...p,[key]:{...(p[key]||{}),checkins:[...(p[key]?.checkins||[]),{answer,time:new Date().toLocaleTimeString()}]}}));
    setCheckinModal(null);
    // Schedule next check-in if more needed
    const prof=profiles.find(p=>p.id===pid);
    const cfg=getCheckinConfig(prof.age);
    const done=(sessionData[key]?.checkins?.length||0)+1;
    if(done<cfg.count) scheduleCheckins(key,pid,cfg);
  }

  function handleCheckinDismiss(key,pid) {
    const dismissed=(sessionData[key]?.dismissed||0);
    if(dismissed===0) {
      // First dismissal — warning
      setSessionData(p=>({...p,[key]:{...(p[key]||{}),dismissed:1}}));
      const prof=profiles.find(p=>p.id===pid);
      const cfg=getCheckinConfig(prof.age);
      setCheckinModal({key,pid,prompt:cfg.prompt,isWarning:true});
    } else {
      // Second dismissal — flag and close
      setSessionData(p=>({...p,[key]:{...(p[key]||{}),dismissed:2,flags:[...(p[key]?.flags||[]),"Dismissed reading check-in twice"]}}));
      setCheckinModal(null);
    }
  }

  // ── BOOK LOOKUP ──────────────────────────────────────────────
  async function lookupISBN(isbn) {
    setScanLoading(true);setScanError("");setShowScanner(false);
    try {
      const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const j=await r.json();
      const key=`ISBN:${isbn}`;
      if(j[key]){
        const book=j[key];
        const title=book.title||"", author=book.authors?.[0]?.name||"", pages=book.number_of_pages||"";
        const coverId=book.cover?.medium||book.cover?.large||"";
        let description="";
        if(book.works?.[0]?.key){try{const wr=await fetch(`https://openlibrary.org${book.works[0].key}.json`);const wj=await wr.json();const raw=typeof wj.description==="string"?wj.description:wj.description?.value||"";description=truncate(raw,3);}catch{}}
        setNewBook(p=>({...p,title,author,pages:String(pages),cover:coverId,description}));
        await enrichWithGoogle(isbn);setScanLoading(false);return;
      }
      await lookupGoogle(isbn);
    } catch {setScanError("Couldn't find this book. Try searching by title instead.");}
    setScanLoading(false);
  }

  async function lookupGoogle(isbn) {
    try {
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
      const j=await r.json();
      if(j.items?.[0]){
        const info=j.items[0].volumeInfo;
        setNewBook(p=>({...p,title:info.title||p.title,author:info.authors?.[0]||p.author,pages:String(info.pageCount||p.pages),cover:info.imageLinks?.thumbnail?.replace("http:","https:")||p.cover,description:truncate(info.description||"",3)||p.description}));
      } else setScanError("Couldn't find this book. Try searching by title instead.");
    } catch {setScanError("Couldn't find this book. Try searching by title instead.");}
  }

  async function enrichWithGoogle(isbn) {
    try {
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
      const j=await r.json();
      if(j.items?.[0]){const info=j.items[0].volumeInfo;if(!newBook.description&&info.description)setNewBook(p=>({...p,description:truncate(info.description,3)}));}
    } catch {}
  }

  async function searchCovers(title) {
    if(!title.trim()) return;
    setCoverLoading(true);setCoverResults([]);setCoverSearched(true);
    try {
      const r=await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=8`);
      const j=await r.json();
      setCoverResults((j.docs||[]).filter(d=>d.cover_i).slice(0,6).map(d=>({id:d.cover_i,title:d.title,author:d.author_name?.[0]||"",url:`https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg`})));
    } catch {setCoverResults([]);}
    setCoverLoading(false);
  }

  function doAddBook(pid) {
    if(!newBook.title.trim()) return;
    const pages=parseInt(newBook.pages)||0,pagesRead=parseInt(newBook.pagesRead)||0,chapters=parseInt(newBook.chapters)||0,chapterOn=parseInt(newBook.chapterOn)||1;
    const completed=chapters>0&&chapterOn>=chapters;
    const book={...newBook,id:Date.now(),dateAdded:new Date().toLocaleDateString(),dateCompleted:completed?new Date().toLocaleDateString():null,pages,pagesRead,chapters,chapterOn,completed,timerLogged:false};
    saveProfile(pid,d=>({...d,books:[book,...d.books]}));
    if(completed) setTimeout(()=>{const c=(pData[pid].books.filter(b=>b.completed).length)+1;checkMilestones(pid,c);},50);
    setNewBook(emptyBook);setCoverResults([]);setCoverSearched(false);setShowAddBook(false);setScanError("");
  }

  function updateProgress(pid,bookId,pagesRead,chapterOn) {
    setPData(prev=>{
      const books=prev[pid].books.map(b=>{
        if(b.id!==bookId) return b;
        const completed=b.chapters>0&&chapterOn>=b.chapters,justCompleted=completed&&!b.completed;
        return {...b,pagesRead,chapterOn,completed,dateCompleted:justCompleted?new Date().toLocaleDateString():b.dateCompleted};
      });
      return {...prev,[pid]:{...prev[pid],books}};
    });
    setTimeout(()=>{setPData(prev=>{checkMilestones(pid,prev[pid].books.filter(b=>b.completed).length);return prev;});},50);
  }

  function checkMilestones(pid,completedCount) {
    const prof=profiles.find(p=>p.id===pid);
    getMilestones(prof.age,rewards[pid]||[]).forEach(m=>{
      if(completedCount>=m.books){
        setPData(prev=>{
          const d=prev[pid];
          if(d.claimedMilestones.includes(m.books)||d.pendingRewards.find(r=>r.milestone===m.books)) return prev;
          return {...prev,[pid]:{...d,pendingRewards:[...d.pendingRewards,{milestone:m.books,reward:m.reward,id:Date.now()}]}};
        });
      }
    });
  }

  function approveReward(pid,rid) {
    setPData(prev=>{
      const r=prev[pid].pendingRewards.find(x=>x.id===rid);
      return {...prev,[pid]:{...prev[pid],pendingRewards:prev[pid].pendingRewards.filter(x=>x.id!==rid),claimedMilestones:[...prev[pid].claimedMilestones,r.milestone]}};
    });
  }

  function approveSession(pid,sessionId) {
    setPData(prev=>{
      const session=prev[pid].pendingSessions.find(s=>s.id===sessionId);
      if(!session) return prev;
      return {...prev,[pid]:{...prev[pid],pendingSessions:prev[pid].pendingSessions.filter(s=>s.id!==sessionId),screenMinutes:prev[pid].screenMinutes+session.mins,timerLog:[{date:session.date,time:session.time,mins:session.mins},...(prev[pid].timerLog||[])]}};
    });
  }

  function denySession(pid,sessionId) {
    saveProfile(pid,d=>({...d,pendingSessions:(d.pendingSessions||[]).filter(s=>s.id!==sessionId)}));
  }

  function doSpend(pid,mins) {
    const entry={date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),mins};
    saveProfile(pid,d=>({...d,screenMinutes:Math.max(0,d.screenMinutes-mins),withdrawalLog:[entry,...(d.withdrawalLog||[])]}));
  }

  async function startQuiz(book,prof) {
    setQuizModal({book,prof});setQuizLoading(true);setQuizData(null);setQuizAns([]);setQuizDone(false);setCurrentQ(0);setQuizTimer(8);
    try {
      const chInfo=book.chapters?`The book has ${book.chapters} chapters. Reader has completed up to Chapter ${book.chapterOn}. ONLY ask about Chapters 1-${book.chapterOn}.`:`Reader has read ${book.pagesRead||0} of ${book.pages||"unknown"} pages.`;
      const descInfo=book.description?`Book description: "${book.description}"`:"";
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:QUIZ_SYS,
          messages:[{role:"user",content:`Book: "${book.title}" by ${book.author||"unknown"}. Age: ${prof.age}. ${chInfo} ${descInfo} Generate exactly 3 questions.`}]})});
      const d=await res.json();
      const txt=d.content?.map(c=>c.text||"").join("")||"";
      setQuizData(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    } catch {setQuizData({error:true});}
    setQuizLoading(false);
  }

                {isPaused&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>resumeTimer(timerKey,prof.id)} style={{...S.solid(prof.color),fontSize:13,padding:"9px"}}>▶ Resume</button>
                    <button onClick={()=>stopTimer(timerKey,prof.id,book.id)} style={{...S.btn("#888"),fontSize:13,padding:"9px"}}>⏹ Done reading</button>
                  </div>
                )}
                {isRunning&&<p style={{fontSize:11,color:"#888",textAlign:"center",marginTop:4}}>1 min reading = 1 min screen time</p>}
              </div>

              {/* Actions */}
              <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                {!book.completed&&<UpdateProgress book={book} gid={prof.id} color={prof.color} onUpdate={updateProgress}/>}
                {book.timerLogged&&(
                  <button onClick={()=>startQuiz(book,prof)} style={{background:"#f5f5f7",border:"1px solid #e0e0e0",borderRadius:20,padding:"4px 12px",fontSize:12,color:"#666",cursor:"pointer"}}>
                    🧠 Comprehension quiz
                  </button>
                )}
              </div>
            </div>
          );
        })}

        {/* ADD BOOK MODAL */}
        {showAddBook&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
                <h3 style={{fontSize:18,fontWeight:700}}>Add a book</h3>
                <button onClick={()=>{setShowAddBook(false);setShowScanner(false);setScanError("");}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>✕</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                <button onClick={()=>{setShowScanner(true);setScanError("");}} style={{padding:"10px",borderRadius:10,border:`1.5px solid ${prof.color}`,background:prof.light,color:prof.color,fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>📷 Scan barcode</button>
                <button onClick={()=>searchCovers(newBook.title)} style={{padding:"10px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#f5f5f7",color:"#555",fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>🔍 Search title</button>
              </div>
              {showScanner&&<BarcodeScanner onDetected={lookupISBN} onClose={()=>setShowScanner(false)}/>}
              {scanLoading&&<div style={{textAlign:"center",padding:"1rem",color:"#888",fontSize:14}}>Looking up book info…</div>}
              {scanError&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#E24B4A",marginBottom:12}}>{scanError}</div>}
              {coverSearched&&(
                <div style={{marginBottom:14}}>
                  {coverLoading&&<p style={{fontSize:13,color:"#888"}}>Searching...</p>}
                  {!coverLoading&&coverResults.length===0&&<p style={{fontSize:13,color:"#888"}}>No covers found.</p>}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {coverResults.map(c=>(
                      <div key={c.id} onClick={()=>setNewBook(p=>({...p,cover:c.url,title:p.title||c.title,author:p.author||c.author}))}
                        style={{cursor:"pointer",border:`2.5px solid ${newBook.cover===c.url?prof.color:"transparent"}`,borderRadius:6,overflow:"hidden"}}>
                        <img src={c.url} alt={c.title} style={{width:56,height:76,objectFit:"cover",display:"block"}}/>
                      </div>
                    ))}
                  </div>
                  {newBook.cover&&<p style={{fontSize:12,color:prof.color,marginTop:6}}>✓ Cover selected</p>}
                </div>
              )}
              {[["Title","title","Book title","text"],["Author","author","Author name","text"],["Total pages","pages","e.g. 320","number"],["Pages read so far","pagesRead","e.g. 0","number"],["Total chapters","chapters","e.g. 18","number"],["Currently on chapter","chapterOn","e.g. 1","number"]].map(([l,k,ph,t])=>(
                <div key={k} style={{marginBottom:12}}>
                  <label style={S.lbl}>{l}</label>
                  <input type={t} value={newBook[k]} onChange={e=>setNewBook(p=>({...p,[k]:e.target.value}))} placeholder={ph} style={S.input}/>
                </div>
              ))}
              <div style={{marginBottom:12}}>
                <label style={S.lbl}>Description</label>
                <textarea value={newBook.description} onChange={e=>setNewBook(p=>({...p,description:e.target.value}))} placeholder="Auto-filled from scan, or type a short summary..." rows={3} style={{...S.input,resize:"none"}}/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={S.lbl}>Rating</label>
                <div style={{display:"flex",gap:8}}>{[1,2,3,4,5].map(n=><span key={n} onClick={()=>setNewBook(p=>({...p,rating:n}))} style={{fontSize:28,cursor:"pointer",color:n<=newBook.rating?prof.color:"#ddd"}}>★</span>)}</div>
              </div>
              <div style={{marginBottom:16}}>
                <label style={S.lbl}>Note (optional)</label>
                <textarea value={newBook.note} onChange={e=>setNewBook(p=>({...p,note:e.target.value}))} placeholder="What do you think so far?" rows={2} style={{...S.input,resize:"none"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setShowAddBook(false);setShowScanner(false);setScanError("");}} style={{...S.btn("#888"),flex:1}}>Cancel</button>
                <button onClick={()=>doAddBook(prof.id)} style={{...S.solid(prof.color),flex:1}}>Save book</button>
              </div>
            </div>
          </div>
        )}

        {/* QUIZ MODAL */}
        {quizModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"1rem"}}>
                <h3 style={{fontSize:16,fontWeight:700}}>{quizModal.book.title}</h3>
                <button onClick={()=>{setQuizModal(null);setQuizData(null);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>✕</button>
              </div>
              <p style={{fontSize:13,color:"#888",marginBottom:"1rem"}}>{quizModal.book.chapters?`Quiz covers up to Chapter ${quizModal.book.chapterOn}.`:"Answer 3 questions to verify your reading."}</p>
              {quizLoading&&<p style={{textAlign:"center",color:"#888",padding:"2rem 0"}}>Generating quiz…</p>}
              {quizData?.error&&<p style={{color:"#E24B4A"}}>Couldn't load quiz. Check your connection.</p>}
              {quizData&&!quizData.error&&(
                <div>
                  {quizData.questions.map((q,qi)=>(
                    <div key={qi} style={{marginBottom:"1.25rem",opacity:qi===currentQ?1:qi<currentQ?0.5:0.3}}>
                      <p style={{fontWeight:600,fontSize:14,marginBottom:8}}>{qi+1}. {q.q}</p>
                      {qi===currentQ&&q.options.map((opt,oi)=>{
                        const sel=quizAns[qi]===oi,cor=quizDone&&oi===q.answer,wrong=quizDone&&sel&&oi!==q.answer;
                        return <div key={oi} onClick={()=>!quizDone&&setQuizAns(p=>{const n=[...p];n[qi]=oi;return n;})}
                          style={{padding:"10px 14px",borderRadius:10,marginBottom:6,fontSize:14,cursor:quizDone?"default":"pointer",
                            border:`1.5px solid ${cor?"#1D9E75":wrong?"#E24B4A":sel?prof.color:"#e0e0e0"}`,
                            background:cor?"#E1F5EE":wrong?"#FFEBEE":sel?prof.light:"transparent"}}>{opt}</div>;
                      })}
                      {qi<currentQ&&<div style={{fontSize:13,color:quizAns[qi]===q.answer?"#1D9E75":"#E24B4A",fontWeight:600}}>{quizAns[qi]===q.answer?"✓ Correct":"✗ Incorrect"}</div>}
                    </div>
                  ))}
                  {/* Per-question nav with timer */}
                  {!quizDone&&(
                    <div style={{marginTop:8}}>
                      {quizTimer>0&&<div style={{fontSize:12,color:"#888",textAlign:"center",marginBottom:8}}>Answer locked for {quizTimer}s…</div>}
                      <button onClick={()=>{
                        if(currentQ<quizData.questions.length-1){setCurrentQ(q=>q+1);setQuizTimer(8);}
                        else setQuizDone(true);
                      }} disabled={quizAns[currentQ]===undefined||quizTimer>0}
                        style={{...S.solid(prof.color),opacity:(quizAns[currentQ]===undefined||quizTimer>0)?0.4:1}}>
                        {currentQ<quizData.questions.length-1?"Next question →":"Submit answers"}
                      </button>
                    </div>
                  )}
                  {quizDone&&(()=>{
                    const correct=quizData.questions.filter((q,i)=>quizAns[i]===q.answer).length;
                    return <div style={{background:correct>=2?prof.light:"#f5f5f7",borderRadius:10,padding:"12px 16px",marginBottom:14,textAlign:"center"}}>
                      <div style={{fontWeight:700,fontSize:15,color:correct>=2?prof.color:"#888"}}>{correct}/3 correct — {correct>=2?"Reading verified ✓":"Keep reading and try again!"}</div>
                    </div>;
                  })()}
                </div>
              )}
              <button onClick={()=>{setQuizModal(null);setQuizData(null);}} style={{...S.btn("#888"),marginTop:8}}>Close</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ════════════════════════════════════════════════════
  // PARENT DASHBOARD
  // ════════════════════════════════════════════════════
  if(screen==="parent"){
    if(!parentUnlocked) return (
      <div style={{maxWidth:360,margin:"0 auto",padding:"3rem 1.5rem"}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#888",fontSize:15,cursor:"pointer",marginBottom:"1.5rem",padding:0}}>← Back</button>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:6}}>Parent dashboard</h2>
        <p style={{color:"#888",fontSize:14,marginBottom:"1.5rem"}}>Enter your PIN to continue.</p>
        <input type="password" inputMode="numeric" maxLength={6} value={pinInput} autoFocus
          onChange={e=>{setPinInput(e.target.value.replace(/\D/g,""));setPinError("");}}
          onKeyDown={e=>{if(e.key==="Enter"){if(pinInput===parentPin){setParentUnlocked(true);setPinInput("");setPinError("");}else{setPinError("Incorrect PIN");setPinInput("");}}}}
          placeholder="••••" style={{...S.input,fontSize:28,textAlign:"center",letterSpacing:8,marginBottom:10}}/>
        {pinError&&<p style={{color:"#E24B4A",fontSize:13,marginBottom:10}}>{pinError}</p>}
        <button onClick={()=>{if(pinInput===parentPin){setParentUnlocked(true);setPinInput("");setPinError("");}else{setPinError("Incorrect PIN");setPinInput("");}}} style={S.solid("#534AB7")}>Unlock</button>
      </div>
    );

    const allPending=profiles.flatMap(p=>(pData[p.id]?.pendingSessions||[]).map(s=>({...s,profileId:p.id,profileName:p.name,profileColor:p.color,profileLight:p.light,profileAvatar:p.avatar})));

    return (
      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem 1rem 2rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1rem"}}>
          <button onClick={()=>{setScreen("home");setParentUnlocked(false);}} style={{background:"none",border:"none",color:"#888",fontSize:22,cursor:"pointer",padding:0}}>←</button>
          <h2 style={{fontSize:18,fontWeight:700}}>Parent dashboard</h2>
        </div>
        <div style={{display:"flex",gap:4,background:"#f0f0f0",borderRadius:12,padding:4,marginBottom:"1.25rem",overflowX:"auto"}}>
          {["overview","approvals","rewards","history","settings"].map(t=>(
            <button key={t} onClick={()=>setParentTab(t)} style={{flexShrink:0,padding:"8px 10px",borderRadius:8,border:"none",background:parentTab===t?"#fff":"transparent",fontWeight:parentTab===t?700:400,fontSize:12,cursor:"pointer",color:parentTab===t?"#1a1a1a":"#888",position:"relative"}}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
              {t==="approvals"&&allPending.length>0&&<span style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:"50%",background:"#E24B4A"}}/>}
            </button>
          ))}
        </div>

        {/* OVERVIEW */}
        {parentTab==="overview"&&profiles.map(p=>{
          const d=pData[p.id]||{};
          const completedCount=(d.books||[]).filter(b=>b.completed).length;
          const ms=getMilestones(p.age,rewards[p.id]||[]);
          const nxt=ms.find(m=>completedCount<m.books&&!(d.claimedMilestones||[]).includes(m.books));
          const pendingSessions=(d.pendingSessions||[]).length;
          return <div key={p.id} style={S.card}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:p.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:p.color}}>{p.avatar}</div>
              <div>
                <div style={{fontWeight:700}}>{p.name} {p.age<18&&<span style={{color:"#888",fontSize:13,fontWeight:400}}>age {p.age}</span>}</div>
                <div style={{fontSize:13,color:"#888"}}>{completedCount} books · {d.screenMinutes||0} min banked · {getStreak(d.books||[])} day streak</div>
              </div>
            </div>
            {pendingSessions>0&&<div style={{fontSize:13,color:"#856404",background:"#FFF8E1",borderRadius:8,padding:"6px 10px",marginBottom:8}}>⏳ {pendingSessions} session{pendingSessions>1?"s":""} pending approval</div>}
            {(d.pendingRewards||[]).map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f9f9f9",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                <span style={{fontSize:13}}>🎁 {r.reward} <span style={{color:"#888",fontSize:12}}>({r.milestone} books)</span></span>
                <button onClick={()=>approveReward(p.id,r.id)} style={{background:p.light,color:p.color,border:"none",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>Approve</button>
              </div>
            ))}
            {nxt&&<div style={{fontSize:13,color:"#888",marginTop:6}}>Next: {nxt.books} books → {nxt.reward} ({nxt.books-completedCount} to go)</div>}
            <button onClick={()=>{setSpendModal(p);setSpendAmt(30);}} style={{marginTop:10,background:"#f5f5f7",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,color:"#666",cursor:"pointer"}}>Deduct screen time</button>
          </div>;
        })}

        {/* APPROVALS */}
        {parentTab==="approvals"&&(
          <div>
            {allPending.length===0&&<p style={{color:"#888",fontSize:14,textAlign:"center",padding:"2rem 0"}}>No sessions pending approval. 🎉</p>}
            {allPending.map(session=>(
              <div key={session.id} style={S.card}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:session.profileLight,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:session.profileColor,fontSize:14}}>{session.profileAvatar}</div>
                  <div>
                    <div style={{fontWeight:700}}>{session.profileName}</div>
                    <div style={{fontSize:13,color:"#888"}}>{session.date} at {session.time} · {session.mins} min · {session.bookTitle}</div>
                  </div>
                </div>
                {/* Flags */}
                {session.flags.map((f,i)=>(
                  <div key={i} style={{background:"#FFEBEE",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#E24B4A",marginBottom:6}}>⚠️ {f}</div>
                ))}
                {/* Check-in responses */}
                {session.checkins.length>0&&(
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:4}}>Reading check-in responses:</div>
                    {session.checkins.map((c,i)=>(
                      <div key={i} style={{background:"#f9f9f9",borderRadius:8,padding:"6px 10px",fontSize:13,marginBottom:4}}>
                        <span style={{color:"#aaa",fontSize:11}}>{c.time} — </span>{c.answer}
                      </div>
                    ))}
                  </div>
                )}
                {session.checkins.length===0&&<div style={{fontSize:13,color:"#aaa",marginBottom:8}}>No check-in responses recorded.</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>denySession(session.profileId,session.id)} style={{...S.btn("#E24B4A"),flex:1,fontSize:13,padding:"8px"}}>Deny</button>
                  <button onClick={()=>approveSession(session.profileId,session.id)} style={{...S.solid(session.profileColor),flex:1,fontSize:13,padding:"8px"}}>Approve +{session.mins} min</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* REWARDS */}
        {parentTab==="rewards"&&(
          <div>
            {profiles.map(p=>(
              <div key={p.id} style={{marginBottom:"1.5rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:p.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:p.color}}>{p.avatar}</div>
                    <span style={{fontWeight:700,fontSize:15}}>{p.name}</span>
                  </div>
                  <button onClick={()=>{setRewardDraft({pid:p.id,items:[...(rewards[p.id]||[])]});setEditRewards(true);}} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Edit</button>
                </div>
                {(rewards[p.id]||[]).map((r,i)=>(
                  <div key={i} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:".75rem 1.25rem",marginBottom:6}}><span>🎁</span><span style={{fontSize:14}}>{r}</span></div>
                ))}
              </div>
            ))}
            {editRewards&&rewardDraft&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
                <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
                  <h3 style={{fontSize:18,fontWeight:700,marginBottom:"1rem"}}>Edit {profiles.find(p=>p.id===rewardDraft.pid)?.name}'s rewards</h3>
                  {rewardDraft.items.map((r,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                      <input value={r} onChange={e=>{const items=[...rewardDraft.items];items[i]=e.target.value;setRewardDraft({...rewardDraft,items});}} style={{...S.input,flex:1}}/>
                      <button onClick={()=>setRewardDraft({...rewardDraft,items:rewardDraft.items.filter((_,j)=>j!==i)})} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
                    </div>
                  ))}
                  <button onClick={()=>setRewardDraft({...rewardDraft,items:[...rewardDraft.items,"New reward"]})} style={{fontSize:13,padding:"6px 14px",borderRadius:20,border:"1px solid #e0e0e0",background:"transparent",cursor:"pointer",marginBottom:16}}>+ Add reward</button>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setEditRewards(false)} style={{...S.btn("#888"),flex:1}}>Cancel</button>
                    <button onClick={()=>{setRewards(prev=>({...prev,[rewardDraft.pid]:rewardDraft.items}));setEditRewards(false);}} style={{...S.solid("#534AB7"),flex:1}}>Save</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* HISTORY */}
        {parentTab==="history"&&profiles.map(p=>{
          const d=pData[p.id]||{};
          const all=[...(d.timerLog||[]).map(t=>({...t,type:"deposit"})),...(d.withdrawalLog||[]).map(t=>({...t,type:"withdraw"}))].slice(0,20);
          return <div key={p.id} style={{marginBottom:"1.5rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:p.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:p.color}}>{p.avatar}</div>
              <span style={{fontWeight:700}}>{p.name}</span>
            </div>
            {all.length===0&&<p style={{fontSize:13,color:"#888",paddingLeft:38}}>No history yet.</p>}
            {all.map((e,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px 8px 38px",borderBottom:"1px solid #f0f0f0",fontSize:13}}>
                <span style={{color:"#888"}}>{e.type==="deposit"?"📚 Reading":"📱 Screen time"} · {e.date} {e.time}</span>
                <span style={{fontWeight:700,color:e.type==="deposit"?"#1D9E75":"#E24B4A"}}>{e.type==="deposit"?"+":"-"}{e.mins} min</span>
              </div>
            ))}
          </div>;
        })}

        {/* SETTINGS */}
        {parentTab==="settings"&&(
          <div>
            <p style={{fontWeight:700,fontSize:15,marginBottom:12}}>Profiles & minimum session</p>
            {profiles.map(p=>(
              <div key={p.id} style={{...S.card}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:p.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:p.color}}>{p.avatar}</div>
                    <div><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:13,color:"#888"}}>Age {p.age}</div></div>
                  </div>
                  <button onClick={()=>setEditProfile({...p})} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Edit</button>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f9f9f9",borderRadius:8,padding:"8px 12px"}}>
                  <span style={{fontSize:13,color:"#666"}}>Min session to bank time</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="number" min={1} max={120} value={pData[p.id]?.minSessionMins||15}
                      onChange={e=>saveProfile(p.id,d=>({...d,minSessionMins:parseInt(e.target.value)||15}))}
                      style={{width:60,padding:"4px 8px",borderRadius:8,border:"1px solid #e0e0e0",fontSize:14,textAlign:"center"}}/>
                    <span style={{fontSize:13,color:"#888"}}>min</span>
                  </div>
                </div>
              </div>
            ))}
            <p style={{fontWeight:700,fontSize:15,margin:"1.25rem 0 12px"}}>Parent PIN</p>
            {!changingPPin
              ?<div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                 <span style={{fontSize:14,color:"#888"}}>PIN: {"•".repeat(parentPin.length)}</span>
                 <button onClick={()=>{setNewPPin("");setChangingPPin(true);}} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Change</button>
               </div>
              :<div style={S.card}>
                 <label style={S.lbl}>New PIN (min 4 digits)</label>
                 <input type="password" inputMode="numeric" maxLength={6} value={newPPin} onChange={e=>setNewPPin(e.target.value.replace(/\D/g,""))} style={{...S.input,fontSize:24,textAlign:"center",letterSpacing:6,marginBottom:12}}/>
                 <div style={{display:"flex",gap:10}}>
                   <button onClick={()=>setChangingPPin(false)} style={{...S.btn("#888"),flex:1}}>Cancel</button>
                   <button onClick={()=>{if(newPPin.length>=4){setParentPin(newPPin);setChangingPPin(false);}}} style={{...S.solid("#534AB7"),flex:1}}>Save PIN</button>
                 </div>
               </div>
            }
          </div>
        )}

        {editProfile&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%"}}>
              <h3 style={{fontSize:18,fontWeight:700,marginBottom:"1rem"}}>Edit {editProfile.name}</h3>
              <label style={S.lbl}>Name</label>
              <input value={editProfile.name} onChange={e=>setEditProfile(p=>({...p,name:e.target.value,avatar:e.target.value[0]?.toUpperCase()||p.avatar}))} style={{...S.input,marginBottom:12}}/>
              <label style={S.lbl}>Age</label>
              <input type="number" min={1} max={99} value={editProfile.age} onChange={e=>setEditProfile(p=>({...p,age:parseInt(e.target.value)||p.age}))} style={{...S.input,marginBottom:12}}/>
              <label style={S.lbl}>Color</label>
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                {COLOR_OPTIONS.map(c=><div key={c.color} onClick={()=>setEditProfile(p=>({...p,color:c.color,light:c.light}))} style={{width:36,height:36,borderRadius:"50%",background:c.color,cursor:"pointer",border:`3px solid ${editProfile.color===c.color?"#1a1a1a":"transparent"}`}}/>)}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setEditProfile(null)} style={{...S.btn("#888"),flex:1}}>Cancel</button>
                <button onClick={()=>{setProfiles(p=>p.map(x=>x.id===editProfile.id?editProfile:x));setEditProfile(null);}} style={{...S.solid("#534AB7"),flex:1}}>Save</button>
              </div>
            </div>
          </div>
        )}

        {spendModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%"}}>
              <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>Deduct screen time</h3>
              <p style={{fontSize:13,color:"#888",marginBottom:"1rem"}}>{spendModal.name} has {pData[spendModal.id]?.screenMinutes||0} min banked.</p>
              <label style={S.lbl}>Minutes to deduct</label>
              <input type="number" min={1} value={spendAmt} onChange={e=>setSpendAmt(parseInt(e.target.value)||0)} style={{...S.input,fontSize:24,textAlign:"center",marginBottom:16}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setSpendModal(null)} style={{...S.btn("#888"),flex:1}}>Cancel</button>
                <button onClick={()=>{doSpend(spendModal.id,spendAmt);setSpendModal(null);}} style={{...S.solid(spendModal.color),flex:1}}>Deduct</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
