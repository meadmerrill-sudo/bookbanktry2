<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#534AB7"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BookBank"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>BookBank</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f7;color:#1a1a1a}
    input,textarea,button{font-family:inherit;font-size:inherit}
    button{cursor:pointer}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DEFAULT_GIRLS = [
  { id:"g1", name:"Erin",   age:13, color:"#378ADD", light:"#E6F1FB", avatar:"E" },
  { id:"g2", name:"Rory",   age:11, color:"#7F77DD", light:"#EEEDFE", avatar:"R" },
  { id:"g3", name:"Weslie", age:7,  color:"#D4537E", light:"#FBEAF0", avatar:"W" },
];

const COLOR_OPTIONS = [
  { label:"Blue",   color:"#378ADD", light:"#E6F1FB" },
  { label:"Purple", color:"#7F77DD", light:"#EEEDFE" },
  { label:"Pink",   color:"#D4537E", light:"#FBEAF0" },
  { label:"Teal",   color:"#1D9E75", light:"#E1F5EE" },
  { label:"Coral",  color:"#D85A30", light:"#FAECE7" },
  { label:"Amber",  color:"#BA7517", light:"#FAEEDA" },
];

const DEFAULT_REWARDS = [
  "Dessert of your choice",
  "Movie night pick",
  "Stay up 30 min late",
  "Choose dinner",
  "Pick a family activity",
  "Extra screen time (60 min)",
];

function getMilestones(age, rewards) {
  const t = age >= 13 ? [6,10,15,22,30] : age >= 11 ? [5,8,12,18,25] : [3,5,8,12,15];
  return t.map((books, i) => ({ books, reward: rewards[i] || rewards[rewards.length-1] }));
}

function getStreak(books) {
  if (!books.length) return 0;
  const dates = [...new Set(books.map(b => b.date))].sort((a,b) => new Date(b)-new Date(a));
  const today = new Date().toLocaleDateString();
  const yesterday = new Date(Date.now()-86400000).toLocaleDateString();
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    if (Math.round((new Date(dates[i-1])-new Date(dates[i]))/86400000) === 1) streak++;
    else break;
  }
  return streak;
}

function load() {
  try { return JSON.parse(localStorage.getItem("bookbank_v3") || "null"); } catch { return null; }
}

function initData() {
  return DEFAULT_GIRLS.reduce((a,g) => {
    a[g.id] = { books:[], screenMinutes:0, pendingRewards:[], claimedMilestones:[], withdrawalLog:[], timerLog:[], pin:null };
    return a;
  }, {});
}

const QUIZ_SYS = `You are a reading comprehension quiz generator for children. Given a book title, age, and pages read, generate exactly 3 multiple-choice questions. Age 7: simple plot/characters. Age 11: plot, motivation, themes. Age 13: themes, inferences, development. Return ONLY valid JSON: {"questions":[{"q":"...","options":["A","B","C","D"],"answer":0}]}`;

const s = {
  card: { background:"#fff", border:"0.5px solid rgba(0,0,0,0.1)", borderRadius:12, padding:"1rem 1.25rem", marginBottom:10 },
  btn:  (c) => ({ width:"100%", padding:"11px", borderRadius:10, border:`1.5px solid ${c}`, background:"transparent", color:c, fontWeight:600, fontSize:15, cursor:"pointer" }),
  solid:(c) => ({ width:"100%", padding:"11px", borderRadius:10, border:"none", background:c, color:"#fff", fontWeight:600, fontSize:15, cursor:"pointer" }),
  input:{ width:"100%", padding:"10px 12px", borderRadius:10, border:"1px solid rgba(0,0,0,0.15)", background:"#f5f5f7", fontSize:15, boxSizing:"border-box", color:"#1a1a1a" },
  label:{ fontSize:13, color:"#666", display:"block", marginBottom:5 },
};

function UpdateProgress({ book, gid, color, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [val, setVal] = useState(book.pagesRead);
  if (!open) return (
    <button onClick={()=>setOpen(true)} style={{background:"transparent",border:`1px solid ${color}`,borderRadius:20,padding:"4px 12px",fontSize:12,color,cursor:"pointer",fontWeight:600}}>
      Update pages
    </button>
  );
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <input type="number" min={0} max={book.pages} value={val} onChange={e=>setVal(parseInt(e.target.value)||0)}
        style={{width:72,padding:"4px 8px",borderRadius:8,border:`1.5px solid ${color}`,fontSize:13,textAlign:"center"}}/>
      <span style={{fontSize:12,color:"#888"}}>of {book.pages}</span>
      <button onClick={()=>{onUpdate(gid,book.id,val);setOpen(false);}}
        style={{background:color,border:"none",borderRadius:20,padding:"4px 12px",fontSize:12,color:"#fff",cursor:"pointer",fontWeight:600}}>Save</button>
      <button onClick={()=>setOpen(false)}
        style={{background:"none",border:"none",fontSize:12,color:"#888",cursor:"pointer"}}>Cancel</button>
    </div>
  );
}

function App() {
  const saved = load();
  const [girls, setGirls]           = useState(saved?.girls      || DEFAULT_GIRLS);
  const [data,  setData]            = useState(saved?.data       || initData());
  const [rewards, setRewards]       = useState(saved?.rewards    || DEFAULT_REWARDS);
  const [parentPin, setParentPin]   = useState(saved?.parentPin  || "1234");

  const [screen, setScreen]         = useState("home");
  const [activeGid, setActiveGid]   = useState(null);
  const [parentUnlocked, setParentUnlocked] = useState(false);
  const [pinInput, setPinInput]     = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinError, setPinError]     = useState("");
  const [pinStep, setPinStep]       = useState(1);

  const [timerActive, setTimerActive] = useState({});
  const [timerStart,  setTimerStart]  = useState({});
  const [elapsed,     setElapsed]     = useState({});
  const intRef = useRef(null);

  const [addBook,       setAddBook]       = useState(false);
  const [quizModal,     setQuizModal]     = useState(null);
  const [quizData,      setQuizData]      = useState(null);
  const [quizLoading,   setQuizLoading]   = useState(false);
  const [quizAns,       setQuizAns]       = useState([]);
  const [quizDone,      setQuizDone]      = useState(false);
  const [newBook,       setNewBook]       = useState({ title:"", author:"", pages:"", pagesRead:"", rating:5, note:"", cover:"" });
  const [coverLoading,  setCoverLoading]  = useState(false);
  const [coverResults,  setCoverResults]  = useState([]);
  const [coverSearched, setCoverSearched] = useState(false);
  const [editGirl,      setEditGirl]      = useState(null);
  const [spendModal,    setSpendModal]    = useState(null);
  const [spendAmt,      setSpendAmt]      = useState(30);
  const [parentTab,     setParentTab]     = useState("overview");
  const [editRewards,   setEditRewards]   = useState(false);
  const [rewardDraft,   setRewardDraft]   = useState([]);
  const [changingPPin,  setChangingPPin]  = useState(false);
  const [newPPin,       setNewPPin]       = useState("");

  useEffect(() => {
    try { localStorage.setItem("bookbank_v3", JSON.stringify({ girls, data, rewards, parentPin })); } catch {}
  }, [girls, data, rewards, parentPin]);

  useEffect(() => {
    if (Object.values(timerActive).some(Boolean)) {
      intRef.current = setInterval(() => {
        const now = Date.now();
        setElapsed(p => {
          const n = {...p};
          girls.forEach(g => { if (timerActive[g.id] && timerStart[g.id]) n[g.id] = Math.floor((now-timerStart[g.id])/1000); });
          return n;
        });
      }, 1000);
    } else clearInterval(intRef.current);
    return () => clearInterval(intRef.current);
  }, [timerActive, timerStart]);

  function save(gid, fn) { setData(p => ({...p, [gid]: fn(p[gid])})); }
  function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }

  function startTimer(gid) {
    setTimerActive(p=>({...p,[gid]:true}));
    setTimerStart(p=>({...p,[gid]:Date.now()}));
    setElapsed(p=>({...p,[gid]:0}));
  }
  function stopTimer(gid) {
    const mins = Math.floor((elapsed[gid]||0)/60);
    setTimerActive(p=>({...p,[gid]:false}));
    if (mins > 0) {
      const e = { date:new Date().toLocaleDateString(), time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}), mins };
      save(gid, d => ({...d, screenMinutes:d.screenMinutes+mins, timerLog:[e,...(d.timerLog||[])]}));
    }
  }

  async function searchCovers(title) {
    if (!title.trim()) return;
    setCoverLoading(true); setCoverResults([]); setCoverSearched(true);
    try {
      const r = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=8`);
      const j = await r.json();
      setCoverResults((j.docs||[]).filter(d=>d.cover_i).slice(0,6).map(d=>({
        id:d.cover_i, title:d.title, author:d.author_name?.[0]||"",
        url:`https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg`
      })));
    } catch { setCoverResults([]); }
    setCoverLoading(false);
  }

  function doAddBook(gid) {
    if (!newBook.title.trim()) return;
    const pages = parseInt(newBook.pages)||0;
    const pagesRead = parseInt(newBook.pagesRead)||0;
    const completed = pages > 0 && pagesRead >= pages;
    const book = {...newBook, id:Date.now(), dateAdded:new Date().toLocaleDateString(), dateCompleted: completed ? new Date().toLocaleDateString() : null, pages, pagesRead, completed};
    save(gid, d => ({...d, books:[book,...d.books]}));
    if (completed) checkMilestones(gid, (data[gid].books?.length||0)+1);
    setNewBook({title:"",author:"",pages:"",pagesRead:"",rating:5,note:"",cover:""});
    setCoverResults([]); setCoverSearched(false); setAddBook(false);
  }

  function updateProgress(gid, bookId, pagesRead) {
    setData(p => {
      const books = p[gid].books.map(b => {
        if (b.id !== bookId) return b;
        const completed = b.pages > 0 && pagesRead >= b.pages;
        const justCompleted = completed && !b.completed;
        return {...b, pagesRead, completed, dateCompleted: justCompleted ? new Date().toLocaleDateString() : b.dateCompleted};
      });
      const newCompleted = books.filter(b=>b.completed).length;
      return {...p, [gid]: {...p[gid], books}};
    });
    // check milestones after state updates
    setTimeout(() => {
      setData(p => {
        const completedCount = p[gid].books.filter(b=>b.completed).length;
        checkMilestones(gid, completedCount);
        return p;
      });
    }, 50);
  }

  function checkMilestones(gid, count) {
    const girl = girls.find(g=>g.id===gid);
    getMilestones(girl.age, rewards).forEach(m => {
      if (count >= m.books) {
        setData(p => {
          const d = p[gid];
          if (d.claimedMilestones.includes(m.books) || d.pendingRewards.find(r=>r.milestone===m.books)) return p;
          return {...p, [gid]:{...d, pendingRewards:[...d.pendingRewards,{milestone:m.books,reward:m.reward,id:Date.now()}]}};
        });
      }
    });
  }

  async function startQuiz(book, girl) {
    setQuizModal({book,girl}); setQuizLoading(true); setQuizData(null); setQuizAns([]); setQuizDone(false);
    try {
      const pct = book.pages>0 ? Math.round((book.pagesRead/book.pages)*100) : 100;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:QUIZ_SYS,
          messages:[{role:"user",content:`Book: "${book.title}" by ${book.author||"unknown"}. Age: ${girl.age}. Pages: ${book.pagesRead||"all"}/${book.pages||"unknown"} (${pct}%)`}]})
      });
      const d = await res.json();
      const txt = d.content?.map(c=>c.text||"").join("")||"";
      setQuizData(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    } catch { setQuizData({error:true}); }
    setQuizLoading(false);
  }

  function approveReward(gid, rid) {
    setData(p => {
      const r = p[gid].pendingRewards.find(x=>x.id===rid);
      return {...p,[gid]:{...p[gid],pendingRewards:p[gid].pendingRewards.filter(x=>x.id!==rid),claimedMilestones:[...p[gid].claimedMilestones,r.milestone]}};
    });
  }

  function doSpend(gid, mins) {
    const e = {date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),mins,reason:"Screen time used"};
    save(gid, d => ({...d, screenMinutes:Math.max(0,d.screenMinutes-mins), withdrawalLog:[e,...(d.withdrawalLog||[])]}));
  }

  function handleProfileTap(gid) {
    const gd = data[gid];
    if (!gd.pin) { setActiveGid(gid); setPinInput(""); setPinConfirm(""); setPinStep(1); setPinError(""); setScreen("pinSetup"); }
    else { setActiveGid(gid); setPinInput(""); setPinError(""); setScreen("pinEntry"); }
  }

  function handlePinSetup() {
    if (pinStep===1) {
      if (pinInput.length<4) { setPinError("PIN must be at least 4 digits"); return; }
      setPinConfirm(pinInput); setPinInput(""); setPinStep(2); setPinError("");
    } else {
      if (pinInput!==pinConfirm) { setPinError("PINs don't match — try again"); setPinInput(""); setPinStep(1); return; }
      save(activeGid, d=>({...d,pin:pinInput}));
      setPinInput(""); setPinError(""); setScreen("profile");
    }
  }

  function handlePinEntry() {
    if (pinInput===data[activeGid].pin) { setPinInput(""); setPinError(""); setScreen("profile"); }
    else { setPinError("Wrong PIN, try again"); setPinInput(""); }
  }

  const girl = activeGid ? girls.find(g=>g.id===activeGid) : null;
  const gd   = activeGid ? data[activeGid] : null;

  // ── HOME ────────────────────────────────────────────
  if (screen==="home") return (
    <div style={{maxWidth:480,margin:"0 auto",padding:"2rem 1rem 1rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.75rem"}}>
        <svg width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" rx="112" fill="#534AB7"/>
          <polygon points="284,0 512,0 512,228" fill="#F9C74F"/>
          <polygon points="284,0 512,228 284,228" fill="#EF9F27" opacity="0.35"/>
          <circle cx="256" cy="320" r="160" fill="#EEEDFE"/>
          <circle cx="256" cy="210" r="108" fill="#EEEDFE"/>
          <ellipse cx="172" cy="130" rx="38" ry="52" fill="#CECBF6" transform="rotate(-10 172 130)"/>
          <ellipse cx="172" cy="134" rx="22" ry="32" fill="#AFA9EC" transform="rotate(-10 172 134)"/>
          <ellipse cx="340" cy="130" rx="38" ry="52" fill="#CECBF6" transform="rotate(10 340 130)"/>
          <ellipse cx="340" cy="134" rx="22" ry="32" fill="#AFA9EC" transform="rotate(10 340 134)"/>
          <circle cx="210" cy="196" r="26" fill="#fff"/>
          <circle cx="215" cy="200" r="16" fill="#26215C"/>
          <circle cx="220" cy="192" r="6" fill="#fff"/>
          <circle cx="302" cy="196" r="26" fill="#fff"/>
          <circle cx="307" cy="200" r="16" fill="#26215C"/>
          <circle cx="312" cy="192" r="6" fill="#fff"/>
          <ellipse cx="256" cy="242" rx="60" ry="46" fill="#CECBF6"/>
          <circle cx="232" cy="240" r="14" fill="#534AB7" opacity="0.3"/>
          <circle cx="280" cy="240" r="14" fill="#534AB7" opacity="0.3"/>
          <path d="M220,268 Q256,292 292,268" fill="none" stroke="#AFA9EC" strokeWidth="8" strokeLinecap="round"/>
          <rect x="210" y="102" width="92" height="24" rx="12" fill="#3C3489"/>
          <circle cx="256" cy="54" r="52" fill="#F9C74F"/>
          <circle cx="256" cy="54" r="36" fill="none" stroke="#EF9F27" strokeWidth="7"/>
          {/* $ sign drawn as paths instead of text for cross-browser SVG compatibility */}
          <path d="M256,28 L256,80" stroke="#7A5010" strokeWidth="6" strokeLinecap="round"/>
          <path d="M244,38 Q232,38 232,50 Q232,62 256,62 Q280,62 280,74 Q280,86 256,86" fill="none" stroke="#7A5010" strokeWidth="6" strokeLinecap="round"/>
          <path d="M268,38 Q280,38 280,50" fill="none" stroke="#7A5010" strokeWidth="6" strokeLinecap="round"/>
          <rect x="96" y="440" width="56" height="60" rx="28" fill="#CECBF6"/>
          <rect x="168" y="450" width="56" height="60" rx="28" fill="#CECBF6"/>
          <rect x="240" y="450" width="56" height="60" rx="28" fill="#CECBF6"/>
          <rect x="312" y="440" width="56" height="60" rx="28" fill="#CECBF6"/>
          <path d="M416,300 Q468,264 458,320 Q448,362 490,348" fill="none" stroke="#CECBF6" strokeWidth="14" strokeLinecap="round"/>
        </svg>
        <div>
          <div style={{fontSize:11,color:"#888",letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>BookBank</div>
          <div style={{fontSize:20,fontWeight:700}}>Who's reading today?</div>
        </div>
      </div>
      {girls.map(g => {
        const d=data[g.id]||{};
        const streak=getStreak(d.books||[]);
        const pending=(d.pendingRewards||[]).length;
        return (
          <div key={g.id} onClick={()=>handleProfileTap(g.id)}
            style={{...s.card,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:g.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:20,color:g.color,flexShrink:0}}>{g.avatar}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:600,fontSize:16}}>{g.name}</span>
                <span style={{fontSize:12,color:"#888"}}>age {g.age}</span>
                {!d.pin&&<span style={{fontSize:11,background:"#FFF3CD",color:"#856404",padding:"2px 8px",borderRadius:8,fontWeight:600}}>Set up PIN</span>}
                {pending>0&&<span style={{fontSize:11,background:g.light,color:g.color,padding:"2px 8px",borderRadius:8,fontWeight:600}}>{pending} reward{pending>1?"s":""} ready!</span>}
                {streak>1&&<span style={{fontSize:11,background:"#FFF8E1",color:"#B8860B",padding:"2px 8px",borderRadius:8,fontWeight:600}}>{streak} day streak 🔥</span>}
              </div>
              <div style={{display:"flex",gap:14,marginTop:4}}>
                <span style={{fontSize:13,color:"#888"}}>📚 {(d.books||[]).length} books</span>
                <span style={{fontSize:13,color:"#888"}}>📱 {d.screenMinutes||0} min</span>
              </div>
            </div>
            {timerActive[g.id]&&<div style={{width:10,height:10,borderRadius:"50%",background:g.color}}/>}
            <span style={{color:"#ccc",fontSize:20}}>›</span>
          </div>
        );
      })}
      <button onClick={()=>setScreen("parent")} style={{...s.btn("#888"),marginTop:8,fontSize:14,color:"#666"}}>🔒 Parent dashboard</button>
    </div>
  );

  // ── PIN SETUP / ENTRY ────────────────────────────────
  if (screen==="pinSetup"||screen==="pinEntry") {
    const isSetup=screen==="pinSetup";
    const g=girls.find(x=>x.id===activeGid);
    return (
      <div style={{maxWidth:360,margin:"0 auto",padding:"3rem 1.5rem"}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#888",fontSize:15,cursor:"pointer",marginBottom:"1.5rem",padding:0}}>← Back</button>
        <div style={{width:64,height:64,borderRadius:"50%",background:g.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:24,color:g.color,marginBottom:"1rem"}}>{g.avatar}</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:6}}>
          {isSetup?(pinStep===1?`Create your PIN, ${g.name}`:"Confirm your PIN"):`Hi ${g.name}!`}
        </h2>
        <p style={{color:"#888",fontSize:14,marginBottom:"1.5rem"}}>
          {isSetup?(pinStep===1?"Choose a 4-digit PIN only you know.":"Enter your PIN one more time to confirm."):"Enter your PIN to continue."}
        </p>
        <input type="password" inputMode="numeric" maxLength={6} value={pinInput}
          onChange={e=>{setPinInput(e.target.value.replace(/\D/g,""));setPinError("");}}
          onKeyDown={e=>e.key==="Enter"&&(isSetup?handlePinSetup():handlePinEntry())}
          placeholder="••••" autoFocus
          style={{...s.input,fontSize:28,textAlign:"center",letterSpacing:8,marginBottom:10}}/>
        {pinError&&<p style={{color:"#E24B4A",fontSize:13,marginBottom:10}}>{pinError}</p>}
        <button onClick={()=>isSetup?handlePinSetup():handlePinEntry()} style={s.solid(g.color)}>
          {isSetup?(pinStep===1?"Next":"Create PIN"):"Unlock"}
        </button>
      </div>
    );
  }

  // ── PROFILE ──────────────────────────────────────────
  if (screen==="profile"&&girl&&gd) {
    const milestones=getMilestones(girl.age,rewards);
    const next=milestones.find(m=>gd.books.length<m.books&&!gd.claimedMilestones.includes(m.books));
    const progress=next?Math.min(100,Math.round((gd.books.length/next.books)*100)):100;
    const isRunning=timerActive[girl.id];
    const secs=elapsed[girl.id]||0;
    const streak=getStreak(gd.books||[]);

    return (
      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem 1rem 2rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1.5rem"}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#888",fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
          <div style={{width:40,height:40,borderRadius:"50%",background:girl.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:girl.color}}>{girl.avatar}</div>
          <div>
            <span style={{fontWeight:700,fontSize:17}}>{girl.name}</span>
            <span style={{color:"#888",fontSize:13,marginLeft:6}}>age {girl.age}</span>
          </div>
          {gd.pendingRewards.length>0&&<span style={{marginLeft:"auto",background:girl.light,color:girl.color,fontSize:12,padding:"4px 12px",borderRadius:20,fontWeight:600}}>🎁 {gd.pendingRewards.length} ready!</span>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:"1.25rem"}}>
          {[["📱 Banked",`${gd.screenMinutes} min`],["📚 Books",gd.books.filter(b=>b.completed).length],["🔥 Streak",streak?`${streak}d`:"—"]].map(([l,v])=>(
            <div key={l} style={{background:"#f5f5f7",borderRadius:10,padding:".75rem"}}>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>{l}</div>
              <div style={{fontSize:17,fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>

        {next&&(
          <div style={{...s.card,marginBottom:"1.25rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
              <span style={{color:"#888"}}>Next: <span style={{color:"#1a1a1a",fontWeight:600}}>{next.reward}</span></span>
              <span style={{color:"#888"}}>{gd.books.length}/{next.books}</span>
            </div>
            <div style={{height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${progress}%`,background:girl.color,borderRadius:4,transition:"width .4s"}}/>
            </div>
          </div>
        )}

        <div style={{...s.card,marginBottom:"1.25rem"}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Reading timer</div>
          {isRunning&&<div style={{fontSize:36,fontWeight:700,textAlign:"center",color:girl.color,marginBottom:10}}>{fmtTime(secs)}</div>}
          <button onClick={()=>isRunning?stopTimer(girl.id):startTimer(girl.id)}
            style={isRunning?s.solid(girl.color):s.btn(girl.color)}>
            {isRunning?"⏹ Stop reading":"▶ Start reading"}
          </button>
          {isRunning&&<p style={{fontSize:12,color:"#888",textAlign:"center",marginTop:6}}>1 min reading = 1 min screen time</p>}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontWeight:700,fontSize:16}}>My books</span>
          <button onClick={()=>setAddBook(true)} style={{background:girl.light,color:girl.color,border:"none",borderRadius:20,padding:"6px 16px",fontWeight:600,fontSize:13,cursor:"pointer"}}>+ Add book</button>
        </div>

        {gd.books.length===0&&<p style={{color:"#888",fontSize:14,textAlign:"center",padding:"2rem 0"}}>No books yet — add your first one!</p>}
        {gd.books.map(book=>{
          const pct = book.pages>0 ? Math.min(100,Math.round((book.pagesRead/book.pages)*100)) : 0;
          return (
          <div key={book.id} style={{...s.card,display:"flex",gap:12}}>
            {book.cover&&<img src={book.cover} alt={book.title} style={{width:52,borderRadius:6,objectFit:"cover",alignSelf:"flex-start",flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{fontWeight:600,fontSize:15}}>{book.title}</div>
                {book.completed
                  ? <span style={{fontSize:11,background:"#E1F5EE",color:"#1D9E75",padding:"2px 8px",borderRadius:8,fontWeight:600,flexShrink:0}}>✓ Done</span>
                  : <span style={{fontSize:11,background:"#FFF8E1",color:"#B8860B",padding:"2px 8px",borderRadius:8,fontWeight:600,flexShrink:0}}>Reading...</span>
                }
              </div>
              {book.author&&<div style={{fontSize:13,color:"#888"}}>{book.author}</div>}
              <div style={{fontSize:12,color:"#aaa",margin:"3px 0"}}>
                Added {book.dateAdded}
                {book.completed&&book.dateCompleted&&` · Finished ${book.dateCompleted}`}
              </div>
              {book.pages>0&&(
                <div style={{margin:"6px 0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:4}}>
                    <span>{book.pagesRead} of {book.pages} pages</span>
                    <span>{pct}%</span>
                  </div>
                  <div style={{height:6,background:"#f0f0f0",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:book.completed?"#1D9E75":girl.color,borderRadius:3,transition:"width .3s"}}/>
                  </div>
                </div>
              )}
              {book.note&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:3}}>"{book.note}"</div>}
              <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                {!book.completed&&book.pages>0&&(
                  <UpdateProgress book={book} gid={girl.id} color={girl.color} onUpdate={updateProgress}/>
                )}
                {(gd.timerLog&&gd.timerLog.length>0)&&(
                  <button onClick={()=>startQuiz(book,girl)} style={{background:"#f5f5f7",border:"1px solid #e0e0e0",borderRadius:20,padding:"4px 12px",fontSize:12,color:"#666",cursor:"pointer"}}>
                    🧠 Comprehension quiz
                  </button>
                )}
              </div>
            </div>
          </div>
          );
        })}

        {addBook&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
                <h3 style={{fontSize:18,fontWeight:700}}>Add a book</h3>
                <button onClick={()=>{setAddBook(false);setCoverResults([]);setCoverSearched(false);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>✕</button>
              </div>
              <label style={s.label}>Title</label>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <input value={newBook.title} onChange={e=>setNewBook(p=>({...p,title:e.target.value}))} placeholder="Book title" style={{...s.input,flex:1}}/>
                <button onClick={()=>searchCovers(newBook.title)} style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${girl.color}`,background:"transparent",color:girl.color,fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>Find cover</button>
              </div>
              {coverSearched&&(
                <div style={{marginBottom:14}}>
                  {coverLoading&&<p style={{fontSize:13,color:"#888"}}>Searching...</p>}
                  {!coverLoading&&coverResults.length===0&&<p style={{fontSize:13,color:"#888"}}>No covers found.</p>}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {coverResults.map(c=>(
                      <div key={c.id} onClick={()=>setNewBook(p=>({...p,cover:c.url,title:p.title||c.title,author:p.author||c.author}))}
                        style={{cursor:"pointer",border:`2.5px solid ${newBook.cover===c.url?girl.color:"transparent"}`,borderRadius:6,overflow:"hidden"}}>
                        <img src={c.url} alt={c.title} style={{width:56,height:76,objectFit:"cover",display:"block"}}/>
                      </div>
                    ))}
                  </div>
                  {newBook.cover&&<p style={{fontSize:12,color:girl.color,marginTop:6}}>✓ Cover selected</p>}
                </div>
              )}
              {[["Author","author","Author name","text"],["Total pages","pages","e.g. 240","number"],["Pages read","pagesRead","e.g. 120","number"]].map(([l,k,ph,t])=>(
                <div key={k} style={{marginBottom:12}}>
                  <label style={s.label}>{l}</label>
                  <input type={t} value={newBook[k]} onChange={e=>setNewBook(p=>({...p,[k]:e.target.value}))} placeholder={ph} style={s.input}/>
                </div>
              ))}
              <div style={{marginBottom:12}}>
                <label style={s.label}>Rating</label>
                <div style={{display:"flex",gap:8}}>{[1,2,3,4,5].map(n=><span key={n} onClick={()=>setNewBook(p=>({...p,rating:n}))} style={{fontSize:28,cursor:"pointer",color:n<=newBook.rating?girl.color:"#ddd"}}>★</span>)}</div>
              </div>
              <div style={{marginBottom:16}}>
                <label style={s.label}>Note (optional)</label>
                <textarea value={newBook.note} onChange={e=>setNewBook(p=>({...p,note:e.target.value}))} placeholder="What did you think?" rows={2} style={{...s.input,resize:"none"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setAddBook(false);setCoverResults([]);setCoverSearched(false);}} style={{...s.btn("#888"),flex:1}}>Cancel</button>
                <button onClick={()=>doAddBook(girl.id)} style={{...s.solid(girl.color),flex:1}}>Save book</button>
              </div>
            </div>
          </div>
        )}

        {quizModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"1rem"}}>
                <h3 style={{fontSize:16,fontWeight:700}}>{quizModal.book.title}</h3>
                <button onClick={()=>{setQuizModal(null);setQuizData(null);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>✕</button>
              </div>
              <p style={{fontSize:13,color:"#888",marginBottom:"1rem"}}>Answer 3 questions to verify your reading.</p>
              {quizLoading&&<p style={{textAlign:"center",color:"#888",padding:"2rem 0"}}>Generating quiz...</p>}
              {quizData?.error&&<p style={{color:"#E24B4A"}}>Couldn't load quiz. Check your connection.</p>}
              {quizData&&!quizData.error&&quizData.questions.map((q,qi)=>(
                <div key={qi} style={{marginBottom:"1.25rem"}}>
                  <p style={{fontWeight:600,fontSize:14,marginBottom:8}}>{qi+1}. {q.q}</p>
                  {q.options.map((opt,oi)=>{
                    const sel=quizAns[qi]===oi,cor=quizDone&&oi===q.answer,wrong=quizDone&&sel&&oi!==q.answer;
                    return <div key={oi} onClick={()=>!quizDone&&setQuizAns(p=>{const n=[...p];n[qi]=oi;return n;})}
                      style={{padding:"10px 14px",borderRadius:10,marginBottom:6,fontSize:14,cursor:quizDone?"default":"pointer",
                        border:`1.5px solid ${cor?"#1D9E75":wrong?"#E24B4A":sel?girl.color:"#e0e0e0"}`,
                        background:cor?"#E1F5EE":wrong?"#FFEBEE":sel?girl.light:"transparent"}}>{opt}</div>;
                  })}
                </div>
              ))}
              {quizDone&&quizData&&!quizData.error&&(()=>{
                const c=quizData.questions.filter((q,i)=>quizAns[i]===q.answer).length;
                return <div style={{background:c>=2?girl.light:"#f5f5f7",borderRadius:10,padding:"12px 16px",marginBottom:14,textAlign:"center"}}>
                  <div style={{fontWeight:700,fontSize:15,color:c>=2?girl.color:"#888"}}>{c}/3 correct — {c>=2?"Reading verified ✓":"Keep reading and try again!"}</div>
                </div>;
              })()}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setQuizModal(null);setQuizData(null);}} style={{...s.btn("#888"),flex:1}}>Close</button>
                {quizData&&!quizData.error&&!quizDone&&<button onClick={()=>setQuizDone(true)} disabled={quizAns.filter(a=>a!==undefined).length<3}
                  style={{...s.solid(girl.color),flex:1,opacity:quizAns.filter(a=>a!==undefined).length<3?0.4:1}}>Submit</button>}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── PARENT ───────────────────────────────────────────
  if (screen==="parent") {
    if (!parentUnlocked) return (
      <div style={{maxWidth:360,margin:"0 auto",padding:"3rem 1.5rem"}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#888",fontSize:15,cursor:"pointer",marginBottom:"1.5rem",padding:0}}>← Back</button>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:6}}>Parent dashboard</h2>
        <p style={{color:"#888",fontSize:14,marginBottom:"1.5rem"}}>Enter your PIN to continue.</p>
        <input type="password" inputMode="numeric" maxLength={6} value={pinInput}
          onChange={e=>{setPinInput(e.target.value.replace(/\D/g,""));setPinError("");}}
          onKeyDown={e=>{if(e.key==="Enter"){if(pinInput===parentPin){setParentUnlocked(true);setPinInput("");setPinError("");}else{setPinError("Incorrect PIN");setPinInput("");}}}}
          placeholder="••••" autoFocus style={{...s.input,fontSize:28,textAlign:"center",letterSpacing:8,marginBottom:10}}/>
        {pinError&&<p style={{color:"#E24B4A",fontSize:13,marginBottom:10}}>{pinError}</p>}
        <button onClick={()=>{if(pinInput===parentPin){setParentUnlocked(true);setPinInput("");setPinError("");}else{setPinError("Incorrect PIN");setPinInput("");}}} style={s.solid("#534AB7")}>Unlock</button>
      </div>
    );

    return (
      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem 1rem 2rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1rem"}}>
          <button onClick={()=>{setScreen("home");setParentUnlocked(false);}} style={{background:"none",border:"none",color:"#888",fontSize:22,cursor:"pointer",padding:0}}>←</button>
          <h2 style={{fontSize:18,fontWeight:700}}>Parent dashboard</h2>
        </div>
        <div style={{display:"flex",gap:4,background:"#f0f0f0",borderRadius:12,padding:4,marginBottom:"1.25rem"}}>
          {["overview","rewards","history","settings"].map(t=>(
            <button key={t} onClick={()=>setParentTab(t)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",background:parentTab===t?"#fff":"transparent",fontWeight:parentTab===t?700:400,fontSize:13,cursor:"pointer",color:parentTab===t?"#1a1a1a":"#888"}}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>

        {parentTab==="overview"&&girls.map(g=>{
          const d=data[g.id]||{};
          const ms=getMilestones(g.age,rewards);
          const nxt=ms.find(m=>(d.books||[]).length<m.books&&!(d.claimedMilestones||[]).includes(m.books));
          return <div key={g.id} style={s.card}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:g.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:g.color}}>{g.avatar}</div>
              <div>
                <div style={{fontWeight:700}}>{g.name} <span style={{color:"#888",fontSize:13,fontWeight:400}}>age {g.age}</span></div>
                <div style={{fontSize:13,color:"#888"}}>{(d.books||[]).length} books · {d.screenMinutes||0} min banked · {getStreak(d.books||[])} day streak</div>
              </div>
            </div>
            {(d.pendingRewards||[]).map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f9f9f9",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                <span style={{fontSize:13}}>🎁 {r.reward} <span style={{color:"#888",fontSize:12}}>({r.milestone} books)</span></span>
                <button onClick={()=>approveReward(g.id,r.id)} style={{background:g.light,color:g.color,border:"none",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>Approve</button>
              </div>
            ))}
            {nxt&&<div style={{fontSize:13,color:"#888",marginTop:6}}>Next: {nxt.books} books → {nxt.reward} ({nxt.books-(d.books||[]).length} to go)</div>}
            <button onClick={()=>{setSpendModal(g);setSpendAmt(30);}} style={{marginTop:10,background:"#f5f5f7",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,color:"#666",cursor:"pointer"}}>Deduct screen time</button>
          </div>;
        })}

        {parentTab==="rewards"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontSize:14,color:"#888"}}>Rewards are earned at age-scaled milestones.</p>
            <button onClick={()=>{setRewardDraft([...rewards]);setEditRewards(true);}} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Edit</button>
          </div>
          {rewards.map((r,i)=><div key={i} style={{...s.card,display:"flex",alignItems:"center",gap:10,padding:".875rem 1.25rem"}}><span>🎁</span><span style={{fontSize:14}}>{r}</span></div>)}
          {editRewards&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
              <h3 style={{fontSize:18,fontWeight:700,marginBottom:"1rem"}}>Edit rewards</h3>
              {rewardDraft.map((r,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={r} onChange={e=>{const d=[...rewardDraft];d[i]=e.target.value;setRewardDraft(d);}} style={{...s.input,flex:1}}/>
                <button onClick={()=>setRewardDraft(rewardDraft.filter((_,j)=>j!==i))} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
              </div>)}
              <button onClick={()=>setRewardDraft([...rewardDraft,"New reward"])} style={{fontSize:13,padding:"6px 14px",borderRadius:20,border:"1px solid #e0e0e0",background:"transparent",cursor:"pointer",marginBottom:16}}>+ Add reward</button>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setEditRewards(false)} style={{...s.btn("#888"),flex:1}}>Cancel</button>
                <button onClick={()=>{setRewards(rewardDraft);setEditRewards(false);}} style={{...s.solid("#534AB7"),flex:1}}>Save</button>
              </div>
            </div>
          </div>}
        </div>}

        {parentTab==="history"&&girls.map(g=>{
          const d=data[g.id]||{};
          const all=[...(d.timerLog||[]).map(t=>({...t,type:"deposit"})),...(d.withdrawalLog||[]).map(t=>({...t,type:"withdraw"}))].slice(0,20);
          return <div key={g.id} style={{marginBottom:"1.5rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:g.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:g.color}}>{g.avatar}</div>
              <span style={{fontWeight:700}}>{g.name}</span>
            </div>
            {all.length===0&&<p style={{fontSize:13,color:"#888",paddingLeft:38}}>No history yet.</p>}
            {all.map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px 8px 38px",borderBottom:"1px solid #f0f0f0",fontSize:13}}>
              <span style={{color:"#888"}}>{e.type==="deposit"?"📚":"📱"} {e.date} {e.time}</span>
              <span style={{fontWeight:700,color:e.type==="deposit"?"#1D9E75":"#E24B4A"}}>{e.type==="deposit"?"+":"-"}{e.mins} min</span>
            </div>)}
          </div>;
        })}

        {parentTab==="settings"&&<div>
          <p style={{fontWeight:700,fontSize:15,marginBottom:12}}>Girl profiles</p>
          {girls.map(g=><div key={g.id} style={{...s.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:g.light,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:g.color}}>{g.avatar}</div>
              <div><div style={{fontWeight:600}}>{g.name}</div><div style={{fontSize:13,color:"#888"}}>Age {g.age}</div></div>
            </div>
            <button onClick={()=>setEditGirl({...g})} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Edit</button>
          </div>)}
          <p style={{fontWeight:700,fontSize:15,margin:"1.25rem 0 12px"}}>Parent PIN</p>
          {!changingPPin
            ?<div style={{...s.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
               <span style={{fontSize:14,color:"#888"}}>PIN: {"•".repeat(parentPin.length)}</span>
               <button onClick={()=>{setNewPPin("");setChangingPPin(true);}} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer"}}>Change</button>
             </div>
            :<div style={s.card}>
               <label style={s.label}>New PIN (min 4 digits)</label>
               <input type="password" inputMode="numeric" maxLength={6} value={newPPin} onChange={e=>setNewPPin(e.target.value.replace(/\D/g,""))} style={{...s.input,fontSize:24,textAlign:"center",letterSpacing:6,marginBottom:12}}/>
               <div style={{display:"flex",gap:10}}>
                 <button onClick={()=>setChangingPPin(false)} style={{...s.btn("#888"),flex:1}}>Cancel</button>
                 <button onClick={()=>{if(newPPin.length>=4){setParentPin(newPPin);setChangingPPin(false);}}} style={{...s.solid("#534AB7"),flex:1}}>Save PIN</button>
               </div>
             </div>
          }
        </div>}

        {editGirl&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%"}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:"1rem"}}>Edit {editGirl.name}</h3>
            <label style={s.label}>Name</label>
            <input value={editGirl.name} onChange={e=>setEditGirl(p=>({...p,name:e.target.value,avatar:e.target.value[0]?.toUpperCase()||p.avatar}))} style={{...s.input,marginBottom:12}}/>
            <label style={s.label}>Age</label>
            <input type="number" min={5} max={18} value={editGirl.age} onChange={e=>setEditGirl(p=>({...p,age:parseInt(e.target.value)||p.age}))} style={{...s.input,marginBottom:12}}/>
            <label style={s.label}>Color</label>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              {COLOR_OPTIONS.map(c=><div key={c.color} onClick={()=>setEditGirl(p=>({...p,color:c.color,light:c.light}))}
                style={{width:36,height:36,borderRadius:"50%",background:c.color,cursor:"pointer",border:`3px solid ${editGirl.color===c.color?"#1a1a1a":"transparent"}`}}/>)}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditGirl(null)} style={{...s.btn("#888"),flex:1}}>Cancel</button>
              <button onClick={()=>{setGirls(p=>p.map(g=>g.id===editGirl.id?editGirl:g));setEditGirl(null);}} style={{...s.solid("#534AB7"),flex:1}}>Save</button>
            </div>
          </div>
        </div>}

        {spendModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%"}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>Deduct screen time</h3>
            <p style={{fontSize:13,color:"#888",marginBottom:"1rem"}}>{spendModal.name} has {data[spendModal.id]?.screenMinutes||0} min banked.</p>
            <label style={s.label}>Minutes to deduct</label>
            <input type="number" min={1} value={spendAmt} onChange={e=>setSpendAmt(parseInt(e.target.value)||0)} style={{...s.input,fontSize:24,textAlign:"center",marginBottom:16}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setSpendModal(null)} style={{...s.btn("#888"),flex:1}}>Cancel</button>
              <button onClick={()=>{doSpend(spendModal.id,spendAmt);setSpendModal(null);}} style={{...s.solid(spendModal.color),flex:1}}>Deduct</button>
            </div>
          </div>
        </div>}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
